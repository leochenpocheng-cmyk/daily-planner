<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日計畫</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #F8FAFC;
    --bg3: #EFF3F8;
    --text: #0F172A;
    --text2: #475569;
    --text3: #94A3B8;
    --border: rgba(15,23,42,.08);
    --border2: rgba(15,23,42,.16);
    --purple: #3B82F6;
    --purple-light: #EFF6FF;
    --purple-dark: #2563EB;
    --teal: #0F9D74;
    --teal-light: #E2F7EF;
    --green: #16A34A;
    --green-bg: #F0FDF4;
    --accent-grad: linear-gradient(135deg, #3B82F6 0%, #6366F1 100%);
    --accent-grad-soft: linear-gradient(135deg, #93C5FD 0%, #A5B4FC 100%);
    --canvas: linear-gradient(160deg, #EFF6FF 0%, #F1F5F9 50%, #EEF2FF 100%);
    --radius: 10px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 3px rgba(15,23,42,.06);
    --shadow-md: 0 6px 20px rgba(15,23,42,.09);
    --shadow-lg: 0 16px 40px rgba(15,23,42,.13);
    --shadow-accent: 0 10px 30px rgba(59,130,246,.30);
    --urg-red: #EF4444;
    --urg-red-bg: #FEF2F2;
    --urg-orange: #F59E0B;
    --urg-orange-bg: #FFF7ED;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0F172A;
      --bg2: #1E293B;
      --bg3: #293548;
      --text: #F1F5F9;
      --text2: #94A3B8;
      --text3: #64748B;
      --border: rgba(255,255,255,.08);
      --border2: rgba(255,255,255,.15);
      --purple: #60A5FA;
      --purple-light: #1e3a5f;
      --purple-dark: #3B82F6;
      --teal-light: #0a3d2e;
      --green-bg: #102a1a;
      --canvas: linear-gradient(160deg, #0a1120 0%, #0F172A 50%, #111827 100%);
      --shadow-sm: 0 1px 3px rgba(0,0,0,.35);
      --shadow-md: 0 6px 20px rgba(0,0,0,.45);
      --shadow-lg: 0 16px 40px rgba(0,0,0,.55);
      --urg-red-bg: #3a1a1a;
      --urg-orange-bg: #3a2a10;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--canvas); color: var(--text); font-size: 13px; height: 100vh; display: flex; align-items: stretch; justify-content: center; padding: 24px; -webkit-font-smoothing: antialiased; }
  .app { display: grid; grid-template-columns: 92px 1fr; width: 100%; max-width: 940px; background: var(--bg); border-radius: 22px; overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow-lg); }

  /* Sidebar */
  .sidebar { background: linear-gradient(180deg, var(--bg2) 0%, var(--bg3) 100%); border-right: 1px solid var(--border); padding: 18px 10px; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
  .nav-logo { text-align: center; font-size: 13px; font-weight: 800; letter-spacing: .04em; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); background: var(--accent-grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 10px 4px; border-radius: 12px; cursor: pointer; border: none; background: none; width: 100%; color: var(--text2); transition: all .18s ease; position: relative; }
  .nav-item:hover { background: var(--bg); color: var(--text); transform: translateY(-1px); }
  .nav-item.active { background: var(--bg); color: var(--purple); box-shadow: var(--shadow-sm); }
  .nav-item.active::before { content: ''; position: absolute; left: 0; top: 22%; bottom: 22%; width: 3px; border-radius: 0 3px 3px 0; background: var(--accent-grad); }
  .nav-icon { font-size: 21px; line-height: 1; }
  .nav-label { font-size: 10px; font-weight: 600; }
  .nav-spacer { flex: 1; }
  .nav-badge { min-width: 17px; height: 17px; background: var(--accent-grad); color: white; font-size: 9px; font-weight: 700; border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 0 4px; margin-top: 2px; box-shadow: var(--shadow-accent); }

  /* Main */
  .main { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
  .main-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .main-title { font-size: 20px; font-weight: 800; letter-spacing: -.02em; }
  .main-sub { font-size: 12px; color: var(--text3); margin-top: 3px; font-weight: 500; }
  .hdr-right { display: flex; gap: 8px; align-items: center; }
  .progress-ring-wrap { display: flex; align-items: center; gap: 8px; margin-right: 4px; }
  .progress-ring-label { font-size: 12px; color: var(--text2); line-height: 1; }
  .progress-ring-label span { font-weight: 700; color: var(--purple); }
  .progress-ring { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--bg3); stroke-width: 4; }
  .ring-fill { fill: none; stroke: var(--purple); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset .4s ease; }
  .btn { font-size: 12px; padding: 8px 14px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: inherit; font-weight: 600; transition: all .15s ease; }
  .btn:hover { background: var(--bg2); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .btn.primary { background: var(--accent-grad); color: white; border: none; font-weight: 600; box-shadow: var(--shadow-accent); }
  .btn.primary:hover { filter: brightness(1.06); transform: translateY(-1px); box-shadow: 0 12px 34px rgba(99,102,241,.45); }

  .main-body { flex: 1; min-height: 0; overflow-y: auto; padding: 18px 20px 60px; }
  .main-body::-webkit-scrollbar { width: 4px; }
  .main-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Focus card */
  .focus-card { background: linear-gradient(135deg,#F0F1FF 0%,#F5F0FF 100%); border-radius: var(--radius-lg); padding: 16px 18px; margin-bottom: 18px; display: flex; align-items: flex-start; gap: 14px; border: 1px solid rgba(99,102,241,.18); position: relative; overflow: hidden; }
  .focus-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent-grad); border-radius: 4px 0 0 4px; }
  .focus-card.all-done { background: linear-gradient(135deg,#ECFDF5,#D1FAE5); border-color: rgba(16,185,129,.25); }
  .focus-card.all-done::before { background: linear-gradient(135deg,#10B981,#0F9D74); }
  .fc-icon { width: 36px; height: 36px; background: var(--accent-grad); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; color: white; box-shadow: 0 4px 10px rgba(99,102,241,.3); }
  .focus-card.all-done .fc-icon { background: linear-gradient(135deg,#10B981,#0F9D74); box-shadow: 0 4px 10px rgba(16,185,129,.3); }
  .fc-body { flex: 1; min-width: 0; }
  .fc-eyebrow { font-size: 10px; color: var(--purple); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; font-weight: 700; }
  .focus-card.all-done .fc-eyebrow { color: #059669; }
  .fc-task { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 3px; line-height: 1.3; letter-spacing: -.01em; }
  .fc-why { font-size: 11px; color: var(--text3); }
  .fc-actions { display: flex; gap: 8px; margin-top: 10px; }
  .fc-done { font-size: 11px; font-weight: 700; padding: 6px 16px; background: var(--accent-grad); color: white; border: none; border-radius: var(--radius); cursor: pointer; box-shadow: 0 3px 8px rgba(99,102,241,.3); }
  .fc-done:hover { filter: brightness(1.08); }
  .fc-skip { font-size: 11px; padding: 6px 12px; background: transparent; color: var(--text3); border: 1px solid var(--border2); border-radius: var(--radius); cursor: pointer; }
  .fc-skip:hover { border-color: var(--purple); color: var(--purple); }

  /* Sections */
  .sec-hd { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .sec-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -.01em; display: flex; align-items: center; gap: 9px; }
  .sec-title::before { content: ''; width: 4px; height: 16px; border-radius: 4px; background: var(--accent-grad); }
  .sec-count { font-size: 11px; min-width: 22px; height: 22px; background: var(--purple-light); color: var(--purple); border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 0 7px; font-weight: 700; }
  .sec-extra { margin-left: auto; font-size: 12px; color: var(--purple); background: none; border: none; cursor: pointer; }
  .divider { height: 0.5px; background: var(--border); margin: 16px 0; }

  /* Task rows */
  .t-row { display: flex; align-items: flex-start; gap: 11px; padding: 11px 14px; background: var(--bg); border: none; border-bottom: 1px solid var(--border); border-radius: 0; margin-bottom: 0; box-shadow: none; transition: background .12s; }
  .t-row:first-of-type { border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
  .t-row:last-child { border-bottom: none; border-radius: 0 0 var(--radius-lg) var(--radius-lg); margin-bottom: 0; }
  .t-row:hover { background: #F5F6FF; box-shadow: none; transform: none; }
  .t-row:hover .t-actions { opacity: 1; }
  .t-row.urg-red { border-left: 3px solid var(--urg-red); }
  .t-row.urg-orange { border-left: 3px solid var(--urg-orange); }
  .t-rows-wrap { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 9px; background: var(--bg); }
  .cb { width: 20px; height: 20px; border: 2px solid var(--border2); border-radius: 50%; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .cb:hover { border-color: var(--purple); transform: scale(1.1); }
  .cb.chk { background: linear-gradient(135deg,#10B981,#0D9488); border-color: transparent; }
  .cb.chk::after { content: '✓'; color: white; font-size: 11px; font-weight: 700; }
  /* Compact done row */
  .t-done-row { display: flex; align-items: center; gap: 8px; padding: 5px 10px; border-radius: 8px; cursor: pointer; transition: background .12s; }
  .t-done-row:hover { background: var(--bg2); }
  .done-check { width: 16px; height: 16px; border-radius: 50%; background: linear-gradient(135deg,#10B981,#0D9488); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .done-check::after { content: '✓'; color: white; font-size: 9px; font-weight: 700; }
  .done-label { font-size: 12px; color: var(--text3); flex: 1; }
  .done-undo { font-size: 10px; color: var(--text3); opacity: 0; transition: opacity .12s; padding: 1px 6px; border: 0.5px solid var(--border2); border-radius: 10px; }
  .t-done-row:hover .done-undo { opacity: 1; }
  .t-body { flex: 1; min-width: 0; }
  .t-txt { font-size: 13px; line-height: 1.4; word-break: break-word; overflow-wrap: break-word; white-space: normal; }
  .t-txt.done { text-decoration: line-through; color: var(--text3); }
  .done-view .t-txt.done { text-decoration: none; color: var(--text); }
  .t-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
  .pill { font-size: 10px; padding: 2px 8px; border-radius: 20px; }
  .pill-w { background: var(--purple-light); color: var(--purple-dark); }
  .pill-p { background: var(--teal-light); color: var(--teal); }
  .pill-urg { background: #FAECE7; color: #712B13; }
  .pill-warn { background: #FAEEDA; color: #633806; }
  .pill-ok { background: var(--bg2); color: var(--text3); }
  .t-actions { opacity: 0; display: flex; gap: 4px; flex-shrink: 0; transition: opacity .12s; }
  .ic-btn { width: 26px; height: 26px; border: none; background: none; cursor: pointer; color: var(--text3); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .ic-btn:hover { background: var(--bg2); color: var(--text); }
  .ic-btn.starred { color: var(--purple); }
  .move-btn { font-size: 10px; padding: 2px 8px; border: 0.5px solid var(--border2); border-radius: 20px; background: var(--bg); color: var(--text2); cursor: pointer; white-space: nowrap; }
  .move-btn:hover { border-color: var(--purple); color: var(--purple); }

  /* Project cards */
  .proj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .proj-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; cursor: pointer; transition: border-color .12s; }
  .proj-card:hover { border-color: var(--border2); }
  .proj-card.sel { border-color: var(--purple); }
  .pc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .pc-name { font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .pc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .pc-dot-w { background: var(--purple); }
  .pc-dot-p { background: #1D9E75; }
  .pc-pct { font-size: 11px; color: var(--text3); }
  .pbar { height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
  .pbar-w { height: 100%; background: var(--purple); border-radius: 2px; }
  .pbar-p { height: 100%; background: #1D9E75; border-radius: 2px; }
  .pc-dl { font-size: 10px; color: var(--text3); }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); padding: 24px; width: 400px; max-width: 90vw; max-height: 90vh; overflow-y: auto; border: 0.5px solid var(--border2); }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
  .modal-field { margin-bottom: 14px; }
  .modal-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
  .modal-field input, .modal-field select, .modal-field textarea { width: 100%; font-size: 13px; padding: 8px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-family: inherit; outline: none; }
  .modal-field input:focus, .modal-field select:focus { border-color: var(--purple); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .modal-cancel { font-size: 13px; padding: 8px 16px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: none; color: var(--text2); cursor: pointer; font-family: inherit; }
  .modal-cancel:hover { background: var(--bg2); }
  .modal-save { font-size: 13px; font-weight: 600; padding: 8px 20px; border: none; border-radius: var(--radius); background: var(--purple); color: white; cursor: pointer; font-family: inherit; }
  .modal-save:hover { background: var(--purple-dark); }

  .t-desc { font-size: 12px; color: var(--text3); margin-top: 3px; line-height: 1.4; word-break: break-word; overflow-wrap: break-word; }
  .subtasks { margin-top: 6px; padding-left: 4px; }
  .sub-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .sub-cb { width: 14px; height: 14px; border: 1.5px solid var(--border2); border-radius: 3px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; transition: all .12s; }
  .sub-cb:hover { border-color: var(--purple); }
  .sub-cb.chk { background: var(--purple); border-color: var(--purple); color: white; }
  .sub-txt { font-size: 12px; color: var(--text2); flex: 1; }
  .sub-txt.done { text-decoration: line-through; color: var(--text3); }
  .sub-del { opacity: 0; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; padding: 0 2px; }
  .sub-row:hover .sub-del { opacity: 1; }
  .sub-add-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .sub-add-input { flex: 1; font-size: 12px; padding: 3px 8px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-family: inherit; outline: none; }
  .sub-add-input:focus { border-color: var(--purple); }
  .sub-add-btn { font-size: 11px; padding: 3px 8px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: none; color: var(--text2); cursor: pointer; white-space: nowrap; }
  .sub-add-btn:hover { border-color: var(--purple); color: var(--purple); }
  .t-expand { font-size: 11px; color: var(--text3); cursor: pointer; background: none; border: none; padding: 0; margin-top: 3px; display: flex; align-items: center; gap: 3px; }
  .t-expand:hover { color: var(--purple); }
  .empty { font-size: 12px; color: var(--text3); padding: 20px 0; text-align: center; }
  .sec-toggle { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; line-height: 1; padding: 0 2px; transition: transform .2s, color .12s; }
  .sec-toggle:hover { color: var(--purple); }
  .sec-toggle.open { transform: rotate(180deg); }
  .backlog-body { overflow: hidden; transition: max-height .25s ease; }
  .backlog-body.collapsed { max-height: 0 !important; }
  .done-section { margin-top: 10px; }
  .done-toggle-row { display: flex; align-items: center; gap: 6px; padding: 4px 2px; cursor: pointer; user-select: none; }
  .done-toggle-row:hover .done-toggle-label { color: var(--purple); }
  .done-toggle-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .02em; }
  .done-toggle-count { font-size: 10px; background: #D1FAE5; color: #065F46; border-radius: 20px; padding: 1px 7px; font-weight: 600; }
  .done-toggle-arrow { font-size: 10px; color: var(--text3); transition: transform .2s; }
  .done-toggle-arrow.open { transform: rotate(90deg); }
  .done-list { overflow: hidden; transition: max-height .25s ease; }
  .done-list.collapsed { max-height: 0 !important; }

  /* Urgency badge on task rows */
  .t-row.urg-red { border-left: 3px solid var(--urg-red); padding-left: 8px; }
  .t-row.urg-orange { border-left: 3px solid var(--urg-orange); padding-left: 8px; }

  /* New project overview cards */
  /* Project editorial layout */
  .proj-overview-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
  .proj-sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .proj-drag-placeholder { border-radius: var(--radius-lg); background: var(--purple-light); border: 2px dashed var(--purple); opacity: .5; min-height: 80px; }

  /* Base card */
  .proj-ov-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); cursor: pointer; box-shadow: var(--shadow-sm); transition: box-shadow .15s, transform .15s; position: relative; display: flex; flex-direction: column; overflow: hidden; }
  .proj-ov-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .proj-ov-card.dragging { opacity: .3; pointer-events: none; }
  .proj-ov-card.drop-before { outline: 2px solid var(--purple); outline-offset: 2px; }
  .proj-ov-card.drop-after  { outline: 2px solid var(--purple); outline-offset: -2px; }

  /* Card inner */
  .poc-inner { padding: 14px 16px 13px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .poc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .poc-name { font-size: 14px; font-weight: 700; letter-spacing: -.02em; line-height: 1.3; flex: 1; }
  .poc-hero .poc-name { font-size: 16px; }
  .poc-badges { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .poc-urg-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
  .poc-urg-badge.red    { background: var(--urg-red-bg); color: var(--urg-red); }
  .poc-urg-badge.orange { background: var(--urg-orange-bg); color: var(--urg-orange); }
  .poc-mid { display: flex; align-items: center; gap: 10px; }
  .poc-stat { display: flex; flex-direction: column; gap: 1px; }
  .poc-stat-val { font-size: 20px; font-weight: 800; letter-spacing: -.04em; color: var(--text); line-height: 1; }
  .poc-hero .poc-stat-val { font-size: 26px; }
  .poc-stat-lbl { font-size: 10px; color: var(--text3); font-weight: 500; }
  .poc-divider { width: 1px; height: 32px; background: var(--border); flex-shrink: 0; }
  .poc-next { flex: 1; min-width: 0; }
  .poc-next-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-bottom: 3px; }
  .poc-next-txt { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .poc-pbar-wrap { display: flex; align-items: center; gap: 8px; }
  .poc-pbar { flex: 1; height: 4px; background: var(--bg3); border-radius: 4px; overflow: hidden; }

function du(dl) { if (!dl) return 999; return Math.round((new Date(dl) - new Date(TODAY)) / 86400000); }
function ds(ts) { if (!ts) return 999; return Math.round((new Date(TODAY) - new Date(ts)) / 86400000); }
function score(t) {
  const d = du(t.deadline);
  return (d < 7 ? 50 : d < 30 ? 30 : d < 90 ? 10 : 0) +
    (ds(t.lastDone) > 7 ? 30 : ds(t.lastDone) > 3 ? 15 : 0) +
    (t.pri || 1) * 10 + (t.today ? 20 : 0);
}
function gp(id) { return D.projects.find(p => p.id === id); }

function dlPill(t) {
  if (!t.deadline || t.done) return '';
  const d = du(t.deadline);
  if (d <= 0) return `<span class="pill pill-urg">今天截止</span>`;
  if (d <= 3) return `<span class="pill pill-urg">${d}天後</span>`;
  if (d <= 14) return `<span class="pill pill-warn">${d}天後</span>`;
  return `<span class="pill pill-ok">${d}天後</span>`;
}

function doneSection(tasks, sectionId) {
  if (!tasks.length) return '';
  const listId = 'done-list-' + sectionId;
  const arrowId = 'done-arrow-' + sectionId;
  const rows = tasks.map(t =>
    `<div class="t-done-row" onclick="toggle('${t.id}')">
      <div class="done-check"></div>
      <div class="done-label">${t.txt}</div>
      <div class="done-undo">取消完成</div>
    </div>`
  ).join('');
  return `<div class="done-section">
    <div class="done-toggle-row" onclick="toggleDoneList('${listId}','${arrowId}')">
      <span class="done-toggle-arrow" id="${arrowId}">▶</span>
      <span class="done-toggle-label">已完成</span>
      <span class="done-toggle-count">${tasks.length}</span>
    </div>
    <div class="done-list collapsed" id="${listId}" style="max-height:0">${rows}</div>
  </div>`;
}

    `星期${weekday}，${now.getMonth() + 1} 月 ${now.getDate()} 日`;

  // 進度環
  const totalToday = todayOpen.length + todayDone.length;

  if (totalToday > 0) {
    const pct = todayDone.length / totalToday;

    ringWrap.style.display = 'flex';

}

function projUrgency(p) {
  const tasks = D.tasks.filter(t => t.proj === p.id && !t.done);
  if (!tasks.length) return 'green';
  const minDays = Math.min(...tasks.map(t => du(t.deadline)));
  const dlDays = du(p.deadline);
  const d = Math.min(minDays, dlDays);
  if (d <= 7) return 'red';
  if (d <= 30) return 'orange';
  return 'green';
}

let dragProjId = null;
let dragPlaceholder = null;

let dragHabitId = null, dragHabitTimer = null;
function onHabitDragStart(e, id) {
  dragHabitId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
  dragHabitTimer = setTimeout(() => {
    dragHabitTimer = null;
    const card = document.querySelector(`.habit-card[data-habit-id="${id}"]`);
    if (card) card.classList.add('dragging');
  }, 0);
}
function onHabitDragOver(e, id) {
  if (!dragHabitId || dragHabitId === id) return;
  e.preventDefault();
  e.stopPropagation();
  const card = e.currentTarget;
  const pos = e.clientY < card.getBoundingClientRect().top + card.offsetHeight / 2 ? 'before' : 'after';
  document.querySelectorAll('.habit-card').forEach(c => c.classList.remove('drop-before','drop-after'));
  card.classList.add(pos === 'before' ? 'drop-before' : 'drop-after');
}
function onHabitDrop(e, id) {
  e.preventDefault();
  e.stopPropagation();
  if (!dragHabitId || dragHabitId === id) { cleanupHabitDrag(); return; }
  const card = e.currentTarget;
  const pos = e.clientY < card.getBoundingClientRect().top + card.offsetHeight / 2 ? 'before' : 'after';
  const habits = D.habits;
  const fromIdx = habits.findIndex(h => h.id === dragHabitId);
  let toIdx = habits.findIndex(h => h.id === id);
  if (fromIdx === -1 || toIdx === -1) { cleanupHabitDrag(); return; }
  const targetCat = habits[toIdx].category || 'sport';
  const [moved] = habits.splice(fromIdx, 1);
  toIdx = habits.findIndex(h => h.id === id);
  moved.category = targetCat;
  habits.splice(pos === 'before' ? toIdx : toIdx + 1, 0, moved);
  save(); cleanupHabitDrag(); renderPersonal();
}
function onHabitListDragOver(e) {
  if (!dragHabitId) return;
  e.preventDefault();
}
function onHabitListDrop(e, catKey) {
  e.preventDefault();
  if (!dragHabitId) return;
  const habits = D.habits;
  const fromIdx = habits.findIndex(h => h.id === dragHabitId);
  if (fromIdx === -1) { cleanupHabitDrag(); return; }
  const [moved] = habits.splice(fromIdx, 1);
  moved.category = catKey;
  let lastCatIdx = habits.reduce((acc, h, i) => (h.category || 'sport') === catKey ? i : acc, -1);
  habits.splice(lastCatIdx + 1, 0, moved);
  save(); cleanupHabitDrag(); renderPersonal();
}
function onHabitDragEnd() { cleanupHabitDrag(); }
function cleanupHabitDrag() {
  if (dragHabitTimer) { clearTimeout(dragHabitTimer); dragHabitTimer = null; }
  dragHabitId = null;
  document.querySelectorAll('.habit-card').forEach(c => c.classList.remove('dragging','drop-before','drop-after'));
}

function projOrderFor(projects) {
  const typeKey = projects[0]?.type === 'work' ? 'projOrderWork' : 'projOrderPersonal';
  const saved = D[typeKey];
  if (saved && saved.length) {
    const ids = projects.map(p => p.id);
    const ordered = saved.filter(id => ids.includes(id));
    const rest = ids.filter(id => !ordered.includes(id));
    return [...ordered, ...rest].map(id => projects.find(p => p.id === id)).filter(Boolean);
  }
  return [...projects].sort((a, b) => {
    const o = { red: 0, orange: 1, green: 2 };
    return o[projUrgency(a)] - o[projUrgency(b)];
  });
}

function saveProjOrder(projects) {
  const typeKey = projects[0]?.type === 'work' ? 'projOrderWork' : 'projOrderPersonal';
  D[typeKey] = projects.map(p => p.id);
  save();
}

function projCards(projects) {
  const sorted = projOrderFor(projects);

  const gridId = `proj-grid-${sorted[0]?.type || 'x'}`;
  const restHtml = rest.length
    ? `<div class="proj-sub-grid">${rest.map(p => projCard(p, false)).join('')}</div>`
    : '';
  return `<div class="proj-overview-grid" id="${gridId}">
    ${projCard(hero, true)}
    ${restHtml}
  </div>`;
}

function renameProject(projId) {
  const p = D.projects.find(x => x.id === projId);
  if (!p) return;
  const newName = prompt('專案名稱：', p.name);
  if (newName && newName.trim() && newName.trim() !== p.name) {
    p.name = newName.trim();

    render();

}

let dragOverId = null;
let dragOverPos = null; // 'before' | 'after'

function onProjDragStart(e, projId) {
  dragProjId = projId;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', projId);
  setTimeout(() => {
    document.querySelector(`.proj-ov-card[data-proj-id="${projId}"]`)?.classList.add('dragging');
  }, 0);
}

function onProjDragOver(e, projId) {
  if (!dragProjId || dragProjId === projId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();
  const pos = e.clientY < rect.top + rect.height / 2 ? 'before' : 'after';
  if (dragOverId !== projId || dragOverPos !== pos) {
    dragOverId = projId;
    dragOverPos = pos;
    document.querySelectorAll('.proj-ov-card').forEach(c => {
      c.classList.remove('drop-before', 'drop-after');
    });
    card.classList.add(pos === 'before' ? 'drop-before' : 'drop-after');
  }
}

function onProjDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drop-before', 'drop-after');
  }
}

function onProjDrop(e, targetId, type) {
  e.preventDefault();
  if (!dragProjId || dragProjId === targetId) { cleanupDrag(); return; }
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();
  const dropBefore = e.clientY < rect.top + rect.height / 2;
  const typeKey = type === 'work' ? 'projOrderWork' : 'projOrderPersonal';
  const projs = D.projects.filter(p => p.type === type);
  const ordered = projOrderFor(projs);
  const fromIdx = ordered.findIndex(p => p.id === dragProjId);
  const toIdx = ordered.findIndex(p => p.id === targetId);
  if (fromIdx === -1 || toIdx === -1) { cleanupDrag(); return; }
  const [moved] = ordered.splice(fromIdx, 1);
  let insertAt = ordered.findIndex(p => p.id === targetId);
  if (!dropBefore) insertAt++;
  ordered.splice(insertAt, 0, moved);
  D[typeKey] = ordered.map(p => p.id);
  save();
  cleanupDrag();
  render();
}

function onProjDragEnd(e) {
  cleanupDrag();
}

function cleanupDrag() {
  dragProjId = null; dragOverId = null; dragOverPos = null;
  if (dragPlaceholder) { dragPlaceholder.remove(); dragPlaceholder = null; }
  document.querySelectorAll('.proj-ov-card').forEach(c =>
    c.classList.remove('dragging', 'drop-before', 'drop-after'));
}

function renderProjects() {
  const projs = D.projects.filter(p => p.type === 'work');
  document.getElementById('main-body').innerHTML = projCards(projs);
  document.getElementById('refresh-btn').style.display = 'none';
}

function logDate(entry) { return typeof entry === 'string' ? entry : entry.date; }

function habitWeekCount(h) {
  const now = new Date(TODAY);
  const dow = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
  const monStr = mon.toISOString().slice(0, 10);
  return (h.logs || []).filter(e => isDoneEntry(e) && logDate(e) >= monStr).length;
}
function habitLastDoneStr(h) {
  const sorted = (h.logs || []).slice().sort((a,b) => logDate(b).localeCompare(logDate(a)));
  if (!sorted.length) return null;
  const days = Math.round((new Date(TODAY) - new Date(logDate(sorted[0]))) / 86400000);
  if (days === 0) return '今天';
  if (days === 1) return '昨天';
  return days + ' 天前';
}
function isDoneEntry(e) { return typeof e === 'string' || !e.type || e.type === 'done'; }
function habitTodayCount(h) {
  return (h.logs || []).filter(e => isDoneEntry(e) && logDate(e) === TODAY).length;
}
function habitPeriodDone(h) {
  if (h.freq === 'daily') return habitTodayCount(h) >= (h.target || 1);
  if (h.freq === 'weekly') return habitWeekCount(h) >= (h.target || 1);
  const sorted = (h.logs || []).filter(isDoneEntry).slice().sort((a,b) => logDate(b).localeCompare(logDate(a)));
  if (!sorted.length) return false;
  const days = Math.round((new Date(TODAY) - new Date(logDate(sorted[0]))) / 86400000);
  const freqDays = { biweekly: 14, monthly: 30, quarterly: 90 };
  return days < (freqDays[h.freq] || 30);
}
function habitNextDays(h) {
  const freqDays = { daily: 1, weekly: 7, biweekly: 14, monthly: 30, quarterly: 90 };
  const sorted = (h.logs || []).slice().sort((a,b) => logDate(b).localeCompare(logDate(a)));
  if (!sorted.length) return -99;
  const since = Math.round((new Date(TODAY) - new Date(logDate(sorted[0]))) / 86400000);
  return (freqDays[h.freq] || 7) - since;
}
function logHabit(id) {
  const h = (D.habits || []).find(x => x.id === id);
  if (h && h.quickLog) {
    if (!h.logs) h.logs = [];
    h.logs.push({ date: TODAY, note: '', type: 'done' });
    save(); renderPersonal();
    return;
  }
  openHabitLogModal(id, TODAY, false);
}
function openHabitLogModal(id, date, isRecord) {
  const modal = document.getElementById('habit-log-modal');
  modal.dataset.habitId = id;
  modal.dataset.freeMode = isRecord ? '1' : '0';
  document.getElementById('habit-log-date').value = date || TODAY;
  document.getElementById('habit-log-note').value = '';
  modal.style.display = 'flex';
  setTimeout(() => document.getElementById('habit-log-note').focus(), 50);
}
function confirmHabitLog() {
  const modal = document.getElementById('habit-log-modal');
  const id = modal.dataset.habitId;
  const note = document.getElementById('habit-log-note').value.trim();
  const date = document.getElementById('habit-log-date').value || TODAY;
  const freeMode = modal.dataset.freeMode === '1';
  const editIndex = modal.dataset.editIndex !== undefined ? parseInt(modal.dataset.editIndex) : -1;
  const h = (D.habits || []).find(x => x.id === id);
  if (!h) return closeHabitLogModal();
  if (!h.logs) h.logs = [];
  const entry = { date, note, type: freeMode ? 'record' : 'done' };
  if (editIndex >= 0) {
    h.logs[editIndex] = entry;
  } else {
    h.logs.push(entry);
  }
  save();
  closeHabitLogModal();
  renderPersonal();
  const el = document.getElementById('hh-' + id);
  if (el) el.style.display = 'block';
}
function closeHabitLogModal() {
  document.getElementById('habit-log-modal').style.display = 'none';
  delete document.getElementById('habit-log-modal').dataset.editIndex;
}
function deleteHabitLog(id, idx) {
  const h = (D.habits || []).find(x => x.id === id);

  h.logs.splice(idx, 1);

function editHabitLog(id, idx) {

function unlogHabit(id) {
  const h = (D.habits || []).find(x => x.id === id);
  if (!h || !h.logs || !h.logs.length) return;
  const sorted = h.logs.slice().sort((a,b) => logDate(b).localeCompare(logDate(a)));
  const lastDate = logDate(sorted[0]);
  const idx = h.logs.findIndex(e => logDate(e) === lastDate);
  if (idx !== -1) h.logs.splice(idx, 1);
  save(); renderPersonal();
}

function renderPersonal() {
  const habits = D.habits || [];
  const aspirations = D.aspirations || [];
  const freqLabel = { daily: '每天', weekly: '每週', biweekly: '每兩週', monthly: '每月', quarterly: '每季' };

  const catDef = [
    { key: 'sport',  label: '🏃 運動 & 嗜好' },
    { key: 'family', label: '👨‍👩‍👧 家庭' },
    { key: 'growth', label: '📚 自我成長' },
  ];

  let html = `<div class="sec-hd"><div class="sec-title">生活習慣</div></div>`;

  // 溫馨提醒：所有尚未完成的習慣
  const pendingAll = habits.filter(h => !habitPeriodDone(h));
  if (pendingAll.length) {
    const reminderItems = pendingAll.map(h => {
      const wc = habitWeekCount(h);
      const remain = (h.target || 1) - wc;
      const txt = h.freq === 'weekly' && h.target > 1
        ? `${h.emoji} ${h.name}（本週還差 ${remain} 次）`
        : h.freq === 'daily'
        ? `${h.emoji} ${h.name}（今天還沒做）`
        : `${h.emoji} ${h.name}（尚未完成）`;
      return `<div class="family-reminder-item pending"><div class="fri-dot"></div><span>${txt}</span></div>`;
    }).join('');
    html += `<div class="family-reminder">
      <div class="family-reminder-hd">💛 溫馨提醒｜還沒做的項目</div>
      <div class="family-reminder-items">${reminderItems}</div>
    </div>`;
  }

  catDef.forEach(cat => {
    const catHabits = habits.filter(h => (h.category || 'sport') === cat.key);
    if (!catHabits.length) return;
    html += `<div class="habit-cat-hd">${cat.label}</div>`;
    html += `<div class="habit-list" ondragover="onHabitListDragOver(event)" ondrop="onHabitListDrop(event,'${cat.key}')">`;
    catHabits.forEach(h => {
    const isWeekly = h.freq === 'weekly';
    const isDaily = h.freq === 'daily';
    const weekCount = habitWeekCount(h);
    const todayCount = habitTodayCount(h);
    const periodCount = isDaily ? todayCount : weekCount;
    const lastStr = habitLastDoneStr(h);
    const nextDays = habitNextDays(h);
    const weekDone = habitPeriodDone(h);
    const overdue = nextDays < 0 && !isWeekly && !isDaily;

    let rightHtml = '';
    let leftDotsHtml = '';
    if (h.target > 1) {
      const circ = 75.4;
      const filled = (Math.min(periodCount / h.target, 1) * circ).toFixed(1);
      const ringColor = weekDone ? '#10B981' : '#3B82F6';
      const ringLabel = weekDone ? '✓' : (periodCount + '/' + h.target);
      leftDotsHtml = '<div class="habit-ring-wrap">'
        + '<svg viewBox="0 0 32 32">'
        + '<circle cx="16" cy="16" r="12" fill="none" stroke="var(--bg3)" stroke-width="3"/>'
        + '<circle cx="16" cy="16" r="12" fill="none" stroke="' + ringColor + '" stroke-width="3"'
        + ' stroke-dasharray="' + filled + ' ' + circ + '" stroke-dashoffset="18.85" stroke-linecap="round"/>'
        + '</svg>'
        + '<div class="habit-ring-ct">' + ringLabel + '</div>'
        + '</div>';
    }

    let lastLabel = '';
    if (lastStr) {
      lastLabel = `<span class="habit-last ${overdue ? 'overdue' : ''}">${overdue ? '⚠ ' : ''}上次 ${lastStr}</span>`;
    } else {
      lastLabel = `<span class="habit-last overdue">尚未紀錄</span>`;
    }

    const sortAsc = habitHistorySort[h.id] === 'asc';
    const recentLogs = (h.logs || [])
      .map((e, i) => ({ e, i }))
      .filter(({ e }) => typeof e === 'object' && !!e.note)
      .sort((a, b) => sortAsc
        ? logDate(a.e).localeCompare(logDate(b.e))
        : logDate(b.e).localeCompare(logDate(a.e)))
      .slice(0, 20);
    const historyRows = recentLogs.map(({ e, i }) => {
      const d = logDate(e);
      const n = (typeof e === 'object' && e.note) ? e.note : '';
      const tag = (typeof e === 'object' && e.type === 'record') ? '<span class="hh-tag">記錄</span>' : '<span class="hh-tag done">完成</span>';
      return `<div class="hh-row">

          <button class="hh-act-btn del" onclick="deleteHabitLog('${h.id}',${i})">✕</button>
        </span>
      </div>`;
    }).join('') || '<div class="hh-empty">尚無記錄</div>';

    html += `<div class="habit-wrap">
    <div class="habit-card" draggable="true" data-habit-id="${h.id}"
      ondragstart="onHabitDragStart(event,'${h.id}')"
      ondragover="onHabitDragOver(event,'${h.id}')"
      ondrop="onHabitDrop(event,'${h.id}')"
      ondragend="onHabitDragEnd()">
      <div class="habit-drag-handle"><i class="ti ti-grip-vertical"></i></div>
      <div class="habit-emoji">${h.emoji}</div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-meta">
          <span class="habit-freq">${freqLabel[h.freq] || h.freq}</span>

        <button class="habit-hist-btn" onclick="event.stopPropagation();toggleHabitHistory('${h.id}')" title="歷史記錄">📋</button>
      </div>

        <button class="hh-sort-btn" onclick="toggleHabitSort('${h.id}')">${sortAsc ? '⬆ 舊→新' : '⬇ 新→舊'}</button>
      </div>
      ${historyRows}
    </div>
    </div>`;
    });
    html += `</div>`;
  });

  html += `<div class="divider"></div>`;
  html += `<div class="sec-hd"><div class="sec-title">家人心願</div></div>`;

      <div class="aspiration-note">${a.note}</div>

    html += `<div class="mini-proj-wrap">${projCards(investProjs)}</div>`;

  document.getElementById('main-body').innerHTML = html;
  document.getElementById('refresh-btn').style.display = 'none';
}

function renderProjectDetail() {
  const p = gp(filterProjId);
  const backTarget = prevNav || (p?.type === 'personal' ? 'personal' : 'projects');
  const backLabel = backTarget === 'personal' ? '家庭目標' : '專案總覽';
  if (!p) { nav(backTarget); return; }
  const ts = D.tasks.filter(t => t.proj === filterProjId);
  const open = ts.filter(t => !t.done).sort((a, b) => score(b) - score(a));
  const done = ts.filter(t => t.done);
  const pct = ts.length ? Math.round(done.length / ts.length * 100) : 0;
  const fillCls = p.type === 'work' ? 'work' : 'personal';

  let html = `<div class="proj-detail-back">
    <button class="proj-back-btn" onclick="nav('${backTarget}')"><i class="ti ti-arrow-left"></i> ${backLabel}</button>
    <div class="proj-detail-title">${p.name}</div>
    <div class="proj-detail-meta">${pct}% 完成</div>
  </div>`;
  html += `<div class="poc-progress" style="margin-bottom:16px;">
    <div class="poc-pbar"><div class="poc-pbar-fill ${fillCls}" style="width:${pct}%"></div></div>
    <div class="poc-pct">${done.length}/${ts.length}</div>
  </div>`;
  html += `<div class="sec-hd"><div class="sec-title">待辦任務</div><div class="sec-count">${open.length}</div></div>`;
  if (open.length) {
    html += open.map(t => {
      const d = du(t.deadline);
      const urgCls = d <= 7 ? 'urg-red' : d <= 30 ? 'urg-orange' : '';
      return tRowWithClass(t, true, urgCls);
    }).join('');
  } else {
    html += '<div class="empty">這個專案沒有待辦任務</div>';
  }
  if (done.length) {
    html += doneSection(done, 'proj-' + done[0]?.proj);
  }
  document.getElementById('main-body').innerHTML = html;
  document.getElementById('refresh-btn').style.display = 'none';
}

function renderDone() {
  const done = D.tasks.filter(t => t.done);
  let html = `<div class="sec-hd"><div class="sec-title">已完成</div><div class="sec-count">${done.length}</div></div>`;
  html += done.length ? `<div class="done-view">${done.map(t => tRow(t)).join('')}</div>` : '<div class="empty">還沒有完成的任務</div>';
  document.getElementById('main-body').innerHTML = html;
  document.getElementById('refresh-btn').style.display = 'none';
}

let prevNav = null;

function nav(name) {
  prevNav = currentNav !== 'project-detail' ? currentNav : prevNav;
  currentNav = name;
  filterProjId = null;
  ['today', 'projects', 'personal', 'done'].forEach(n => {
    document.getElementById('nav-' + n)?.classList.toggle('active', n === name);
  });
  const titles = { today: '工作・今日', projects: '工作・專案總覽', personal: '家庭與個人目標', done: '已完成' };
  document.getElementById('view-title').textContent = titles[name] || '';
  if (name !== 'today') document.getElementById('view-sub').textContent = '';
  render();
}

function toggleBacklog() { backlogOpen = !backlogOpen; renderToday(); }
function toggleDoneList(listId, arrowId) {
  const list = document.getElementById(listId);
  const arrow = document.getElementById(arrowId);
  const isOpen = !list.classList.contains('collapsed');
  if (isOpen) {
    list.style.maxHeight = list.scrollHeight + 'px';
    requestAnimationFrame(() => { list.style.maxHeight = '0'; list.classList.add('collapsed'); });
    arrow.classList.remove('open');
  } else {
    list.classList.remove('collapsed');
    list.style.maxHeight = list.scrollHeight + 'px';
    arrow.classList.add('open');
    setTimeout(() => { list.style.maxHeight = 'none'; }, 260);
  }
}
function filterProj(id) { filterProjId = id; render(); }
function refreshAI() { skipSet.clear(); focusId = null; render(); }

function render() {
  updateProjSelect();
  if (currentNav === 'today') renderToday();
  else if (currentNav === 'projects') renderProjects();
  else if (currentNav === 'personal') renderPersonal();
  else if (currentNav === 'project-detail') renderProjectDetail();
  else renderDone();
}

function updateProjSelect() {
  const work = D.projects.filter(p => p.type === 'work');
  const personal = D.projects.filter(p => p.type === 'personal');
  document.getElementById('np').innerHTML =
    `<optgroup label="── 工作專案 ──">${work.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}</optgroup>` +
    `<optgroup label="── 家庭與個人 ──">${personal.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}</optgroup>`;
}

function toggle(id) {
  const t = D.tasks.find(t => t.id === id);
  t.done = !t.done;
  if (t.done) { t.lastDone = TODAY; t.today = false; }
  save(); render();
}
function togglePri(id) { const t = D.tasks.find(t => t.id === id); if (t) t.pri = t.pri >= 3 ? 1 : 3; save(); render(); }
function moveToday(id) { const t = D.tasks.find(t => t.id === id); if (t) t.today = true; save(); render(); }
function del(id) { D.tasks = D.tasks.filter(t => t.id !== id); save(); render(); }

function nowDone() {
  if (!focusId) return;
  const t = D.tasks.find(t => t.id === focusId);
  if (t) { t.done = true; t.lastDone = TODAY; t.today = false; }
  skipSet.delete(focusId); focusId = null;
  save(); render();
}
function nowSkip() { if (focusId) skipSet.add(focusId); focusId = null; renderToday(); }

function addModalSubtask() {
  const inp = document.getElementById('nsub');
  const txt = inp.value.trim();
  if (!txt) return;
  modalSubtasks.push({ id: 's' + Date.now(), txt, done: false });
  inp.value = '';
  renderModalSubtasks();
}

function renderModalSubtasks() {
  document.getElementById('modal-subtasks').innerHTML = modalSubtasks.map((s, i) =>
    `<div class="sub-row">
      <div class="sub-cb ${s.done ? 'chk' : ''}" onclick="modalSubtasks[${i}].done=!modalSubtasks[${i}].done;renderModalSubtasks()">${s.done ? '✓' : ''}</div>
      <div class="sub-txt ${s.done ? 'done' : ''}">${s.txt}</div>
      <button class="sub-del" onclick="modalSubtasks.splice(${i},1);renderModalSubtasks()">×</button>
    </div>`
  ).join('');
}

function addTask() {
  const txt = document.getElementById('nt').value.trim();
  if (!txt) return;
  if (editingTaskId) {
    // 編輯模式
    const t = D.tasks.find(t => t.id === editingTaskId);
    if (t) {
      t.txt = txt;
      t.proj = document.getElementById('np').value;
      t.deadline = document.getElementById('nd').value || null;
      t.desc = document.getElementById('ndesc').value.trim();
      t.subtasks = [...modalSubtasks];
    }
  } else {
    // 新增模式
    D.tasks.push({
      id: 't' + D.nt++,
      proj: document.getElementById('np').value,
      txt,
      desc: document.getElementById('ndesc').value.trim(),
      subtasks: [...modalSubtasks],
      done: false,
      deadline: document.getElementById('nd').value || null,
      lastDone: null, pri: 2,
      today: currentNav === 'today'
    });
  }
  resetModal();
  save(); render();
}

function resetModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-title').textContent = '新增任務';
  document.getElementById('modal-save').textContent = '新增任務';
  document.getElementById('nt').value = '';
  document.getElementById('nd').value = '';
  document.getElementById('ndesc').value = '';
  editingTaskId = null;
  modalSubtasks = [];
  renderModalSubtasks();
}

function openEditModal(id) {
  const t = D.tasks.find(t => t.id === id);
  if (!t) return;
  editingTaskId = id;
  updateProjSelect();
  document.getElementById('modal-title').textContent = '編輯任務';
  document.getElementById('modal-save').textContent = '儲存';
  document.getElementById('nt').value = t.txt;
  document.getElementById('np').value = t.proj;
  document.getElementById('nd').value = t.deadline || '';
  document.getElementById('ndesc').value = t.desc || '';
  modalSubtasks = (t.subtasks || []).map(s => ({ ...s }));
  renderModalSubtasks();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('nt').focus(), 50);
}

function focusAdd() {
  editingTaskId = null;
  updateProjSelect();
  document.getElementById('modal-title').textContent = '新增任務';
  document.getElementById('modal-save').textContent = '新增任務';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('nt').focus(), 50);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  resetModal();
}

function toggleSub(taskId, subId) {
  const t = D.tasks.find(t => t.id === taskId);
  if (!t) return;
  const s = (t.subtasks || []).find(s => s.id === subId);
  if (s) s.done = !s.done;
  save(); render();
}

function delSub(taskId, subId) {
  const t = D.tasks.find(t => t.id === taskId);
  if (!t) return;
  t.subtasks = (t.subtasks || []).filter(s => s.id !== subId);
  save(); render();
}

function addSubInline(taskId, input) {
  const txt = input.value.trim();
  if (!txt) return;
  const t = D.tasks.find(t => t.id === taskId);
  if (!t) return;
  if (!t.subtasks) t.subtasks = [];
  t.subtasks.push({ id: 's' + Date.now(), txt, done: false });
  input.value = '';
  save(); render();
}

document.getElementById('nt').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
document.getElementById('nsub').addEventListener('keydown', e => { if (e.key === 'Enter') addModalSubtask(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
render();

// ── Google Calendar 整合 ──────────────────────────────

function gcalInit() {
  if (!window.google) { setTimeout(gcalInit, 500); return; }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GCAL_CLIENT_ID,
    scope: GCAL_SCOPE,
    callback: async (resp) => {
      if (resp.error) { console.error(resp); return; }
      gcalToken = resp.access_token;
      localStorage.setItem('gcal_token', gcalToken);
      updateGcalBtn(true);
      await fetchCalendarEvents();
      if (currentNav === 'today') render();
    },
  });
  const saved = localStorage.getItem('gcal_token');
  if (saved) {
    gcalToken = saved;
    updateGcalBtn(true);
    fetchCalendarEvents().then(() => { if (currentNav === 'today') render(); });
  }
}

function gcalToggle() {
  if (gcalToken) {
    google.accounts.oauth2.revoke(gcalToken, () => {});
    gcalToken = null; gcalEvents = [];
    localStorage.removeItem('gcal_token');
    updateGcalBtn(false);
    if (currentNav === 'today') render();
    return;
  }
  if (!window.google) { alert('❌ Google 腳本未載入\n請確認網路連線正常後重新整理頁面。'); return; }
  if (!tokenClient) { alert('❌ OAuth 尚未初始化\n請等幾秒後再試，或重新整理頁面。'); return; }
  console.log('requesting token, origin:', location.origin);
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function updateGcalBtn(connected) {
  const btn = document.getElementById('gcal-btn');
  const lbl = document.getElementById('gcal-label');
  if (connected) {
    btn.classList.add('connected');
    lbl.textContent = '已連接';
  } else {
    btn.classList.remove('connected');
    lbl.textContent = '行事曆';
  }
}

async function fetchCalendarEvents() {
  if (!gcalToken) return;
  const start = new Date(); start.setHours(0, 0, 0, 0);
  const end = new Date(); end.setHours(23, 59, 59, 999);
  const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=20`;
  try {
    const res = await fetch(url, { headers: { Authorization: `Bearer ${gcalToken}` } });
    if (res.status === 401) {
      gcalToken = null; localStorage.removeItem('gcal_token');
      updateGcalBtn(false); gcalEvents = [];
      if (currentNav === 'today') render();
      return;
    }
    const data = await res.json();
    gcalEvents = data.items || [];
    console.log('gcal events fetched:', gcalEvents.length, gcalEvents.map(e => e.summary));
  } catch (e) { console.error('gcal fetch error', e); }
}

function renderGcalEvents() {
  if (!gcalToken) {
    return `<div class="gcal-connect-bar">
      <span>連接 Google 行事曆，顯示今日行程</span>
      <button onclick="gcalToggle()">連接</button>
    </div>`;
  }
  if (!gcalEvents.length) return `<div class="event-section"><div class="sec-hd"><div class="sec-title">今日行程</div></div><div class="empty">今天沒有 Google 行事曆行程</div><div class="divider"></div></div>`;
  const rows = gcalEvents.map(ev => {
    const start = ev.start.dateTime || ev.start.date;
    const isAllDay = !ev.start.dateTime;
    const timeStr = isAllDay ? '全天' : new Date(start).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });
    const color = ev.colorId ? `hsl(${parseInt(ev.colorId) * 37}, 60%, 55%)` : '#534AB7';
    return `<div class="event-row">
      <div class="event-dot" style="background:${color}"></div>
      <div class="event-time">${timeStr}</div>
      <div class="event-body">
        <div class="event-title">${ev.summary || '（無標題）'}</div>
        ${ev.location ? `<div class="event-cal">${ev.location}</div>` : ''}
      </div>
    </div>`;
  }).join('');
  return `<div class="event-section">
    <div class="sec-hd"><div class="sec-title">今日行程</div><div class="sec-count">${gcalEvents.length}</div></div>
    ${rows}
    <div class="divider"></div>
  </div>`;
}

window.addEventListener('load', gcalInit);
</script>
